<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BudgetTrack Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Scrollbar for sidebar */
    aside::-webkit-scrollbar {
      width: 6px;
    }
    aside::-webkit-scrollbar-thumb {
      background-color: rgba(0,0,0,0.1);
      border-radius: 3px;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row bg-gradient-to-r from-[#0a0a2a] to-[#2e3adf] text-gray-900">
  <aside class="flex flex-row md:flex-col justify-between w-full md:w-64 border-b md:border-r border-gray-300 bg-[#d1d1d1] overflow-y-auto md:overflow-y-auto">
    <div>
      <a href="Home.html" class="flex items-center gap-3 px-6 py-4 md:py-8 text-blue-700 font-extrabold text-lg md:text-xl tracking-wide hover:text-blue-800 transition">
        <i class="fas fa-file-invoice-dollar text-lg md:text-2xl"></i>
        <span>BudgetTrack</span>
      </a>
      <nav class="flex flex-row md:flex-col space-x-4 md:space-x-0 md:space-y-2 px-4 md:px-6 overflow-x-auto md:overflow-x-visible">
        <a href="Home.html" class="flex items-center gap-2 md:gap-4 px-3 md:px-5 py-2 md:py-3 rounded-lg hover:bg-gray-300 text-gray-700 text-sm md:text-base font-medium transition whitespace-nowrap">
          <i class="fas fa-home text-base md:text-lg"></i>
          Home
        </a>
        <a href="Dashboard.html" class="flex items-center gap-2 md:gap-4 px-3 md:px-5 py-2 md:py-3 rounded-lg bg-blue-100 text-blue-700 font-semibold shadow-md shadow-blue-200 hover:bg-blue-200 transition whitespace-nowrap">
          <i class="fas fa-th-large text-base md:text-lg"></i>
          Dashboard
        </a>
        <a href="Transactions.html" class="flex items-center gap-2 md:gap-4 px-3 md:px-5 py-2 md:py-3 rounded-lg hover:bg-gray-300 text-gray-700 text-sm md:text-base font-medium transition whitespace-nowrap">
          <i class="fas fa-user-friends text-base md:text-lg"></i>
          Transactions
        </a>
        <a href="Settings.html" class="flex items-center gap-2 md:gap-4 px-3 md:px-5 py-2 md:py-3 rounded-lg hover:bg-gray-300 text-gray-700 text-sm md:text-base font-medium transition whitespace-nowrap">
          <i class="fas fa-cog text-base md:text-lg"></i>
          Settings
        </a>
      </nav>
    </div>
    <div class="border-t md:border-t-0 md:border-gray-300">
      <div class="flex items-center gap-4 px-6 py-4 md:py-6">
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-blue-600 text-white text-sm font-bold select-none">
          JO
        </div>
        <div class="text-xs md:text-sm">
          <p class="font-semibold text-gray-900 leading-none">Jonathan Osuna</p>
        </div>
      </div>
      <button class="w-full flex items-center gap-3 px-6 py-4 text-gray-700 text-sm font-semibold hover:bg-gray-300 border-t border-gray-300 transition" id="logoutButton" type="button">
     <i class="fas fa-sign-out-alt text-base">
     </i>
     Log Out
    </button>
    </div>
  </aside>

  <main class="flex-1 p-6 md:p-10 overflow-y-auto">
    <h1 class="text-white font-semibold text-xl md:text-2xl mb-8 md:mb-10 select-none">Dashboard</h1>

    <!-- Top cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 md:gap-8 mb-8 md:mb-10">
      <div class="bg-white rounded-xl p-6 md:p-8 shadow-lg border border-gray-200 hover:shadow-xl transition">
        <p class="text-xs md:text-sm text-blue-600 mb-2 md:mb-3 tracking-wide">Total Balance</p>
        <p class="text-2xl md:text-3xl font-extrabold text-gray-900 mb-2 md:mb-3">Php---,---</p>
      </div>
      <div class="bg-white rounded-xl p-6 md:p-8 shadow-lg border border-gray-200 hover:shadow-xl transition">
        <p class="text-xs md:text-sm text-blue-600 mb-2 md:mb-3 tracking-wide">Monthly Income</p>
        <p class="text-2xl md:text-3xl font-extrabold text-gray-900 mb-2 md:mb-3">Php---,---</p>
      </div>
      <div class="bg-white rounded-xl p-6 md:p-8 shadow-lg border border-gray-200 hover:shadow-xl transition">
        <p class="text-xs md:text-sm text-blue-600 mb-2 md:mb-3 tracking-wide">Monthly Expenses</p>
        <p class="text-2xl md:text-3xl font-extrabold text-gray-900 mb-2 md:mb-3">Php---,---</p>
      </div>
    </div>

    <!-- Income vs Expenses and Budget Progress -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 md:gap-10">
      <section class="lg:col-span-2 bg-white rounded-xl shadow-lg border border-gray-200 p-6 md:p-8 hover:shadow-xl transition">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 md:mb-8">
          <h2 class="text-lg md:text-xl font-semibold text-blue-600 select-none mb-3 sm:mb-0">Income vs Expenses</h2>
          <div class="flex gap-3 text-sm md:text-base text-gray-700 font-medium flex-wrap">
            <button class="border border-gray-300 rounded-lg px-4 py-2 hover:bg-gray-100 transition whitespace-nowrap">Week</button>
            <button class="border border-gray-300 rounded-lg px-4 py-2 hover:bg-gray-100 transition whitespace-nowrap">Month</button>
            <button class="border border-gray-300 rounded-lg px-4 py-2 hover:bg-gray-100 transition whitespace-nowrap">Year</button>
          </div>
        </div>
        <div class="bg-gray-100 rounded-2xl h-48 md:h-56 flex items-center justify-center select-none">
          <i class="fas fa-chart-bar text-gray-400 text-4xl md:text-5xl"></i>
        </div>
      </section>

      <section class="bg-white rounded-xl shadow-lg border border-gray-200 p-6 md:p-8 hover:shadow-xl transition">
        <div class="flex justify-between items-center mb-6 md:mb-8">
          <h2 class="text-base md:text-lg font-semibold text-blue-600 select-none">Budget Progress</h2>
          <span class="text-sm md:text-base text-gray-500 select-none">May 2025</span>
        </div>
        <div class="mb-6 md:mb-8">
          <div class="flex justify-between text-sm md:text-base font-semibold text-gray-900 mb-3 select-none">
            <span>Electricity</span>
            <span><span class="text-gray-700">Php---,---</span> / Php---,---</span>
          </div>
          <div class="w-full h-4 md:h-5 bg-gray-200 rounded-full overflow-hidden shadow-inner">
            <div class="h-4 md:h-5 bg-yellow-400 rounded-full" style="width: 80%"></div>
          </div>
        </div>
        <div>
          <div class="flex justify-between text-sm md:text-base font-semibold text-gray-900 mb-3 select-none">
            <span>Foods</span>
            <span><span class="text-gray-700">Php---,---</span> / Php---,---</span>
          </div>
          <div class="w-full h-4 md:h-5 bg-gray-200 rounded-full overflow-hidden shadow-inner">
            <div class="h-4 md:h-5 bg-yellow-400 rounded-full" style="width: 75%"></div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script>
   document.getElementById('logoutButton').addEventListener('click', function() {
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
