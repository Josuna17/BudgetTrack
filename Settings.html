<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BudgetTrack Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Scrollbar for sidebar */
    aside::-webkit-scrollbar {
      width: 6px;
    }
    aside::-webkit-scrollbar-thumb {
      background-color: rgba(0,0,0,0.1);
      border-radius: 3px;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row bg-gradient-to-r from-[#0a0a2a] to-[#2e3adf] text-gray-900">
  <aside class="flex flex-row md:flex-col justify-between w-full md:w-64 border-b md:border-r border-gray-300 bg-[#d1d1d1] overflow-y-auto md:overflow-y-auto">
    <div>
      <a href="Home.html" class="flex items-center gap-3 px-6 py-4 md:py-8 text-blue-700 font-extrabold text-lg md:text-xl tracking-wide hover:text-blue-800 transition">
        <i class="fas fa-file-invoice-dollar text-lg md:text-2xl"></i>
        <span>BudgetTrack</span>
      </a>
      <nav class="flex flex-row md:flex-col space-x-4 md:space-x-0 md:space-y-2 px-4 md:px-6 overflow-x-auto md:overflow-x-visible">
        <a href="Home.html" class="flex items-center gap-2 md:gap-4 px-3 md:px-5 py-2 md:py-3 rounded-lg hover:bg-gray-300 text-gray-700 text-sm md:text-base font-medium transition whitespace-nowrap">
          <i class="fas fa-home text-base md:text-lg"></i>
          Home
        </a>
        <a href="Dashboard.html" class="flex items-center gap-2 md:gap-4 px-3 md:px-5 py-2 md:py-3 rounded-lg hover:bg-gray-300 text-gray-700 text-sm md:text-base font-medium transition whitespace-nowrap">
          <i class="fas fa-th-large text-base md:text-lg"></i>
          Dashboard
        </a>
        <a href="Transactions.html" class="flex items-center gap-2 md:gap-4 px-3 md:px-5 py-2 md:py-3 rounded-lg hover:bg-gray-300 text-gray-700 text-sm md:text-base font-medium transition whitespace-nowrap">
          <i class="fas fa-user-friends text-base md:text-lg"></i>
          Transactions
        </a>
        <a href="Settings.html" class="flex items-center gap-2 md:gap-4 px-3 md:px-5 py-2 md:py-3 rounded-lg bg-blue-100 text-blue-700 font-semibold shadow-md shadow-blue-200 hover:bg-blue-200 transition whitespace-nowrap">
          <i class="fas fa-cog text-base md:text-lg"></i>
          Settings
        </a>
      </nav>
    </div>
    <div class="border-t md:border-t-0 md:border-gray-300">
      <div class="flex items-center gap-4 px-6 py-4 md:py-6">
        <div class="flex items-center justify-center w-10 h-10 rounded-full bg-blue-600 text-white text-sm font-bold select-none">
          JO
        </div>
        <div class="text-xs md:text-sm">
          <p class="font-semibold text-gray-900 leading-none">Jonathan Osuna</p>
        </div>
      </div>
      <button class="w-full flex items-center gap-3 px-6 py-4 text-gray-700 text-sm font-semibold hover:bg-gray-300 border-t border-gray-300 transition" id="logoutButton" type="button">
     <i class="fas fa-sign-out-alt text-base">
     </i>
     Log Out
    </button>
    </div>
  </aside>

  <main class="flex-1 p-6 md:p-10 overflow-y-auto">
    <h1 class="text-white font-semibold text-xl md:text-2xl mb-8 md:mb-10 select-none">Settings</h1>

    <!-- Settings -->
   <div class="mt-12 max-w-4xl mx-auto rounded-2xl bg-white p-6">
      <div class="border border-gray-600 rounded-2xl relative">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-center text-blue-600 text-sm" style="font-family: Arial, sans-serif;">
          Personal Information
        </div>
        <div class="pt-10 px-8 pb-6 grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4">
          <div class="flex flex-col items-center col-span-1 md:col-span-2">
            <img alt="Profile image showing a blue sky with clouds and green hills" class="rounded-full mb-2" height="80" src="https://storage.googleapis.com/a1aa/image/bc62ce7b-a12f-4430-3e40-da2d1edb78d6.jpg" width="80"/>
            <button class="bg-blue-600 text-white text-xs rounded-md px-3 py-1 hover:bg-blue-700 transition" type="button">
              Change Photo
            </button>
          </div>
          <div>
            <label class="block text-xs mb-1" for="firstName" style="font-family: Arial, sans-serif;">
              First Name
            </label>
            <input class="w-full border border-gray-600 rounded px-2 py-1 text-sm" id="firstName" type="text" value="Jonathan"/>
          </div>
          <div>
            <label class="block text-xs mb-1" for="lastName" style="font-family: Arial, sans-serif;">
              Last Name
            </label>
            <input class="w-full border border-gray-600 rounded px-2 py-1 text-sm" id="lastName" type="text" value="Osuna"/>
          </div>
          <div>
            <label class="block text-xs mb-1" for="email" style="font-family: Arial, sans-serif;">
              Email Address
            </label>
            <input class="w-full border border-gray-600 rounded px-2 py-1 text-sm" id="email" type="email" value="sample@gmail.com"/>
          </div>
          <div>
            <label class="block text-xs mb-1" for="contact" style="font-family: Arial, sans-serif;">
              Contact Number
            </label>
            <input class="w-full border border-gray-600 rounded px-2 py-1 text-sm" id="contact" type="text" value="09123456789"/>
          </div>
          <div>
            <label class="block text-xs mb-1" for="currency" style="font-family: Arial, sans-serif;">
              Currency
            </label>
            <input class="w-full border border-gray-600 rounded px-2 py-1 text-sm" id="currency" type="text" value="Php"/>
          </div>
          <div class="flex justify-end col-span-1 md:col-span-2">
            <button class="bg-blue-600 text-white text-sm rounded-md px-4 py-2 hover:bg-blue-700 transition" type="button">
              Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>
   document.getElementById('logoutButton').addEventListener('click', function() {
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
